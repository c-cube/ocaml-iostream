name: github pages

on:
  push:
    branches:
      - main # Set a branch name to trigger deployment

jobs:
  deploy:
    name: Deploy doc
    runs-on: ubuntu-latest
    container: ghcr.io/c-cube/c-cube-commmon/ci-doc-5.3:latest
    steps:
      - uses: actions/checkout@v6

      - run: apt-get update && apt-get install -y --no-install-recommends zlib1g-dev

      - run: opam install iostream iostream-camlzip

      - run: opam exec -- odig odoc --cache-dir=_doc/ iostream iostream-camlzip

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_doc/html/
          destination_dir: .
          enable_jekyll: false
